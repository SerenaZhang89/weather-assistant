<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气助手</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="outer-wrapper">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-icon">☀️</div>
                <div class="header-title">
                    <h1>天气助手</h1>
                    <p>为您提供精准、实用的天气信息</p>
                </div>
            </div>
            <div class="header-right">

                <a href="https://claude.ai" target="_blank" class="go-claude">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    Go to Claude
                </a>
            </div>
        </div>

        <!-- Location Section -->
        <div class="location-section">
            <div class="section-title">
                当前位置
            </div>
            <div id="location" class="location-info">
                <div class="loading">正在获取位置信息</div>
            </div>
        </div>

        <!-- Weather Section -->
        <div class="weather-section">
            <div class="section-title">
                天气预报
            </div>
            <div id="weather">
                <div class="weather-cards">
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            数据使用开放平台 <strong>Open-Meteo</strong> 与 <strong>OpenStreetMap</strong> 提供，仅供参考。如需准确天气信息请以官方气象部门发布为准。
        </div>
    </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
