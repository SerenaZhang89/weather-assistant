<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气助手</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #F0F4FA;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .outer-wrapper {
            background: rgba(0, 100, 255, 0.6);
            border-radius: 24px;
            padding: 10px;
            max-width: 980px;
            width: 100%;
        }

        .container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            width: 100%;
            padding: 20px;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
            background: url('header.png') center/cover no-repeat;
            border-radius: 16px;
            padding: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            flex-shrink: 0;
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .header-title p {
            font-size: 13px;
            color: rgba(0, 0, 0, 0.5);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            align-self: center;
            gap: 16px;
        }

        .go-claude {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #F5F7FA;
            color: #5B6B8A;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .go-claude:hover { background: #E8ECF2; }

        .go-claude svg {
            width: 14px;
            height: 14px;
        }

        /* ===== City Illustration ===== */
        .illustration {
            position: relative;
            width: 220px;
            height: 110px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .illustration svg {
            width: 100%;
            height: 100%;
        }

        /* ===== Sections ===== */
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        .section-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .section-icon.location { background: #EBF0FF; }
        .section-icon.weather { background: #FFF4E6; }

        /* ===== Location Section ===== */
        .location-section {
            margin-bottom: 28px;
        }

        .location-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 24px;
            align-items: center;
        }

        .location-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #555;
        }

        .location-item .icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
        }

        .location-item .icon.globe { background: #E8F0FE; color: #4A7FE5; }
        .location-item .icon.city { background: #E8F0FE; color: #4A7FE5; }
        .location-item .icon.pin { background: #E8F0FE; color: #4A7FE5; }

        .location-item strong {
            color: #333;
            font-weight: 500;
        }

        .maps-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #E6F7EE;
            color: #2DA562;
            text-decoration: none;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .maps-link:hover { background: #D0F0DE; }

        .maps-link svg {
            width: 14px;
            height: 14px;
        }

        /* ===== Weather Section ===== */
        .weather-section {
            margin-bottom: 24px;
        }

        .weather-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .weather-card {
            background: #FAFBFD;
            border: 1px solid #EEF1F6;
            border-radius: 16px;
            padding: 20px;
            transition: box-shadow 0.2s;
        }

        .weather-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .card-label {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .card-date {
            font-size: 12px;
            color: #6B8ACA;
            background: #EBF0FF;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .card-weather-main {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid #EEF1F6;
        }

        .weather-emoji {
            font-size: 32px;
            line-height: 1;
        }

        .weather-desc {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #666;
        }

        .detail-row .detail-icon {
            font-size: 14px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .card-advice {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px dashed #E0E4EA;
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid #F0F2F5;
            color: #bbb;
            font-size: 12px;
        }

        /* ===== Loading State ===== */
        .loading {
            color: #999;
            font-size: 14px;
            padding: 12px 0;
        }

        .loading::after {
            content: '';
            animation: dots 1.4s steps(4, end) infinite;
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }

        /* ===== Skeleton Loading ===== */
        .skeleton {
            background: linear-gradient(90deg, #F0F2F5 25%, #E8EAED 50%, #F0F2F5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-line {
            height: 14px;
            margin-bottom: 8px;
            width: 60%;
        }

        .skeleton-card {
            height: 220px;
            border-radius: 16px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 720px) {
            body { padding: 16px 8px; }
            .container { padding: 24px 20px 20px; border-radius: 16px; }
            .header { flex-direction: column; gap: 16px; }
            .illustration { display: none; }
            .weather-cards { grid-template-columns: 1fr; }
            .location-info { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="outer-wrapper">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-icon">☀️</div>
                <div class="header-title">
                    <h1>天气助手</h1>
                    <p>为您提供精准、实用的天气信息</p>
                </div>
            </div>
            <div class="header-right">

                <a href="https://claude.ai" target="_blank" class="go-claude">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    Go to Claude
                </a>
            </div>
        </div>

        <!-- Location Section -->
        <div class="location-section">
            <div class="section-title">
                当前位置
            </div>
            <div id="location" class="location-info">
                <div class="loading">正在获取位置信息</div>
            </div>
        </div>

        <!-- Weather Section -->
        <div class="weather-section">
            <div class="section-title">
                天气预报
            </div>
            <div id="weather">
                <div class="weather-cards">
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            数据使用开放平台 <strong>Open-Meteo</strong> 与 <strong>OpenStreetMap</strong> 提供，仅供参考。如需准确天气信息请以官方气象部门发布为准。
        </div>
    </div>
    </div>

    <script>
        const locationDiv = document.getElementById('location');
        let userLat, userLon;

        function renderLocation(country, displayCity, displayDistrict, lat, lon) {
            let html = '';
            const items = [
                { icon: 'globe', emoji: '&#127760;', label: '国家', value: country },
                { icon: 'city', emoji: '&#127961;', label: '城市', value: displayCity },
                { icon: 'pin', emoji: '&#128205;', label: '区域', value: displayDistrict }
            ];
            for (const item of items) {
                if (item.value) {
                    html += `<div class="location-item">
                        <span class="icon ${item.icon}">${item.emoji}</span>
                        <strong>${item.label}:</strong> ${item.value}
                    </div>`;
                }
            }
            html += `<a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" class="maps-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                在 Google Maps 中查看
            </a>`;
            locationDiv.innerHTML = html;
        }

        function onPositionSuccess(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            userLat = lat;
            userLon = lon;
            locationDiv.innerHTML = '<div class="loading">正在解析地址</div>';

            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=zh`)
                .then(res => res.json())
                .then(data => {
                    const addr = data.address || {};
                    const country = addr.country || '未知';
                    const municipalityMap = {
                        'CN-BJ': '北京', 'CN-SH': '上海',
                        'CN-TJ': '天津', 'CN-CQ': '重庆'
                    };
                    const isoCode = addr['ISO3166-2-lvl4'] || '';
                    const municipality = municipalityMap[isoCode];
                    let displayCity, displayDistrict;
                    if (municipality) {
                        displayCity = municipality;
                        const district = addr.city || '';
                        const street = addr.suburb || '';
                        displayDistrict = [district, street].filter(Boolean).join(' · ');
                    } else {
                        displayCity = addr.state || addr.city || addr.town || addr.county || '';
                        displayDistrict = [addr.city_district || addr.city || '', addr.suburb || ''].filter(Boolean).join(' · ');
                    }
                    renderLocation(country, displayCity, displayDistrict, lat, lon);
                    fetchWeather(lat, lon);
                })
                .catch(() => {
                    locationDiv.innerHTML = '<div class="loading" style="color:#E57373;">地址解析失败</div>';
                });
        }

        function onPositionError(error) {
            const messages = {
                1: '您拒绝了位置权限请求。',
                2: '无法获取位置信息。',
                3: '获取位置信息超时。'
            };
            locationDiv.innerHTML = `<div style="color:#E57373;font-size:14px;padding:8px 0;">&#9888;&#65039; ${messages[error.code] || '未知错误'}</div>`;
        }

        function requestLocation() {
            navigator.geolocation.getCurrentPosition(onPositionSuccess, onPositionError, {
                enableHighAccuracy: true,
                maximumAge: 300000,
                timeout: 10000
            });
        }

        if (!navigator.geolocation) {
            locationDiv.innerHTML = '<div style="color:#E57373;font-size:14px;">您的浏览器不支持地理定位。</div>';
        } else if (navigator.permissions) {
            navigator.permissions.query({ name: 'geolocation' }).then(result => {
                if (result.state === 'granted') {
                    locationDiv.innerHTML = '<div class="loading">正在自动获取位置</div>';
                }
                requestLocation();
            }).catch(() => requestLocation());
        } else {
            requestLocation();
        }

        function fetchWeather(lat, lon) {
            const weatherDiv = document.getElementById('weather');
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max&timezone=auto&forecast_days=3`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    const daily = data.daily;
                    if (!daily) {
                        weatherDiv.innerHTML = '<div style="color:#E57373;font-size:14px;">天气数据获取失败</div>';
                        return;
                    }

                    const weatherMap = {
                        0:  { emoji: '☀️', text: '晴' },
                        1:  { emoji: '🌤️', text: '大部晴' },
                        2:  { emoji: '⛅', text: '多云' },
                        3:  { emoji: '☁️', text: '阴' },
                        45: { emoji: '🌫️', text: '雾' },
                        48: { emoji: '🌫️', text: '冻雾' },
                        51: { emoji: '🌦️', text: '小毛毛雨' },
                        53: { emoji: '🌦️', text: '毛毛雨' },
                        55: { emoji: '🌦️', text: '大毛毛雨' },
                        61: { emoji: '🌧️', text: '小雨' },
                        63: { emoji: '🌧️', text: '中雨' },
                        65: { emoji: '🌧️', text: '大雨' },
                        71: { emoji: '🌨️', text: '小雪' },
                        73: { emoji: '🌨️', text: '中雪' },
                        75: { emoji: '🌨️', text: '大雪' },
                        77: { emoji: '🌨️', text: '雪粒' },
                        80: { emoji: '🌧️', text: '阵雨' },
                        81: { emoji: '🌧️', text: '中阵雨' },
                        82: { emoji: '🌧️', text: '强阵雨' },
                        85: { emoji: '🌨️', text: '小阵雪' },
                        86: { emoji: '🌨️', text: '大阵雪' },
                        95: { emoji: '⛈️', text: '雷暴' },
                        96: { emoji: '⛈️', text: '雷暴+小冰雹' },
                        99: { emoji: '⛈️', text: '雷暴+大冰雹' }
                    };

                    function getClothingAdvice(tMin, tMax, rain, wind) {
                        const avg = (tMin + tMax) / 2;
                        let advice = '';
                        if (avg < 5)       advice = '羽绒服、厚外套，注意保暖';
                        else if (avg < 10) advice = '棉衣或厚外套，搭配毛衣';
                        else if (avg < 15) advice = '外套+薄毛衣，早晚较凉';
                        else if (avg < 20) advice = '薄外套或长袖衬衫';
                        else if (avg < 25) advice = '长袖或薄衬衫即可';
                        else if (avg < 30) advice = '短袖、轻薄透气衣物';
                        else               advice = '短袖短裤，注意防暑';
                        if (rain > 50) advice += '；记得带伞';
                        if (wind > 30) advice += '；风大注意防风';
                        if (tMax - tMin > 10) advice += '；昼夜温差大，注意增减衣物';
                        return advice;
                    }

                    const labels = ['今天', '明天', '后天'];
                    let html = '<div class="weather-cards">';
                    for (let i = 0; i < 3; i++) {
                        const code = daily.weathercode[i];
                        const w = weatherMap[code] || { emoji: '❓', text: `未知(${code})` };
                        const tMax = daily.temperature_2m_max[i];
                        const tMin = daily.temperature_2m_min[i];
                        const rain = daily.precipitation_probability_max[i];
                        const wind = daily.windspeed_10m_max[i];
                        const clothing = getClothingAdvice(tMin, tMax, rain, wind);

                        html += `
                        <div class="weather-card">
                            <div class="card-header">
                                <span class="card-label">${labels[i]}</span>
                                <span class="card-date">${daily.time[i]}</span>
                            </div>
                            <div class="card-weather-main">
                                <span class="weather-emoji">${w.emoji}</span>
                                <span class="weather-desc">${w.text}</span>
                            </div>
                            <div class="card-details">
                                <div class="detail-row">
                                    <span class="detail-icon">🌡️</span>
                                    <span>${Math.round(tMin)}°C ~ ${Math.round(tMax)}°C</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-icon">💧</span>
                                    <span>降水概率 ${rain}%</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-icon">💨</span>
                                    <span>最大风速 ${wind} km/h</span>
                                </div>
                            </div>
                            <div class="card-advice">👗 ${clothing}</div>
                        </div>`;
                    }
                    html += '</div>';
                    weatherDiv.innerHTML = html;
                })
                .catch(() => {
                    weatherDiv.innerHTML = '<div style="color:#E57373;font-size:14px;">天气数据获取失败</div>';
                });
        }
    </script>
</body>
</html>
